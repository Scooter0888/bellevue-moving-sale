<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moving Sale — Downtown Bellevue</title>
  <meta name="description" content="Furniture, electronics, kitchen items and more for sale in Downtown Bellevue. Pickup only.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <h1 class="site-title">Moving Sale</h1>
      <p class="site-subtitle">Downtown Bellevue &bull; Pickup Only</p>
    </div>
  </header>

  <!-- Controls -->
  <div class="controls container">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search items..." aria-label="Search items">
    </div>
    <div class="filter-sort">
      <div class="category-filters" id="categoryFilters">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="furniture">Furniture</button>
        <button class="filter-btn" data-category="electronics">Electronics</button>
        <button class="filter-btn" data-category="kitchen">Kitchen</button>
        <button class="filter-btn" data-category="other">Other</button>
      </div>
      <select id="sortSelect" class="sort-select" aria-label="Sort items">
        <option value="newest">Newest First</option>
        <option value="price-low">Price: Low → High</option>
        <option value="price-high">Price: High → Low</option>
      </select>
    </div>
  </div>

  <!-- Items Grid -->
  <main class="container">
    <div class="items-grid" id="itemsGrid">
      <!-- Items injected by JS -->
    </div>
    <div class="no-results" id="noResults" style="display:none;">
      <p>No items match your search. Try a different keyword or category.</p>
    </div>
  </main>

  <!-- Item Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="itemModal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <div class="modal-gallery" id="modalGallery"></div>
      <div class="modal-body">
        <span class="modal-category" id="modalCategory"></span>
        <h2 class="modal-title" id="modalTitle"></h2>
        <p class="modal-price" id="modalPrice"></p>
        <p class="modal-condition" id="modalCondition"></p>
        <p class="modal-description" id="modalDescription"></p>
        <div class="modal-actions">
          <a class="btn btn-sms" id="modalSMS" href="#" aria-label="Send SMS enquiry">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Text Us
          </a>
          <a class="btn btn-email" id="modalEmail" href="#" aria-label="Send email enquiry">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            Email Us
          </a>
          <button class="btn btn-share" id="modalShare" aria-label="Share this item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.59 13.51 6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
            Share
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>Downtown Bellevue &bull; Pickup Only &bull; <a href="sms:+12065937974">Text (206) 593-7974</a> &bull; <a href="mailto:cuttingthrough8@gmail.com">cuttingthrough8@gmail.com</a></p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) { window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; }); }
      });
    }
  </script>
</body>
</html>
